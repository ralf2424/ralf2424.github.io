<style>
  :root {
    --bg:        #0d1117;
    --bg-card:   #161b27;
    --bg-card2:  #1c2333;
    --bg-input:  #0a0e17;
    --border:     #2d333b;
    --border-dim: #21262d;
    --text:       #e6edf3;
    --text-muted: #8b949e;
    --text-dim:   #484f58;
    --green:      #34d399;
    --green-glow: rgba(52,211,153,0.12);
    --blue:       #60a5fa;
    --blue-glow:  rgba(96,165,250,0.12);
    --red:        #f87171;
    --amber:      #fbbf24;
    --radius:     8px;
    --shadow:     0 1px 8px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0e17 0%, #111827 60%, #0f1e33 100%);
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border-dim);
    position: relative; overflow: hidden;
    text-align: center;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(52,211,153,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(96,165,250,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .back-btn { position: relative; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--bg-input); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px 5px 10px; text-decoration: none; margin-bottom: 10px; transition: all .15s; }
  .back-btn:hover { border-color: var(--green); color: var(--green); }
  .header-logo { font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 2px; text-transform: uppercase; position: relative; }
  .header-title { font-size: 22px; font-weight: 700; color: var(--green); margin: 4px 0 3px; letter-spacing: -0.3px; position: relative; }
  .header-planer { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; position: relative; }
  .header-sub { font-size: 11px; color: var(--text-muted); line-height: 1.5; position: relative; }

  /* FILTER BAR */
  .filter-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border-dim);
    padding: 10px 12px 8px;
    max-width: 720px; margin: 0 auto;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .filter-divider {
    font-size: 10px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 5px;
    display: flex; align-items: center; gap: 8px; font-weight: 700;
  }
  .filter-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-dim); }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-muted);
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap; font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.active-main {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    color: #fff; border-color: transparent;
    box-shadow: 0 0 12px rgba(96,165,250,0.25);
  }
  .genre-btn {
    padding: 4px 11px; border-radius: 20px; border: 1px solid;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .genre-btn:hover { filter: brightness(1.25); }
  .genre-btn.active-genre { font-weight: 700; }
  .stars { color: var(--amber); letter-spacing: 1px; }

  .cards { padding: 10px 10px 60px; display: flex; flex-direction: column; gap: 8px; max-width: 720px; margin: 0 auto; }
  .card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .card.hidden { display: none; }

  .card-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; }
  .dot {
    width: 46px; height: 46px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
    flex-shrink: 0; position: relative;

  .dot-spark { position: absolute; top: -5px; right: -5px; font-size: 10px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .card-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .card-stars { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .genre-tag { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .chevron { font-size: 11px; color: var(--text-dim); margin-left: 4px; transition: transform 0.2s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .card.open .card-body { max-height: 700px; }
  .card-body-inner { padding: 12px 14px 14px; border-top: 1px solid var(--border-dim); }
  .card-body-inner p { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }

  .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border-dim); }

  .hits { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .hit {
    background: var(--bg-card2); border: 1px solid var(--border-dim);
    border-radius: 14px; padding: 3px 10px;
    font-size: 11px; color: var(--text-muted);
  }

  .besonderheit {
    background: rgba(251,191,36,0.06);
    border-left: 3px solid var(--amber);
    border-radius: var(--radius);
    padding: 10px 12px; font-size: 12.5px; color: var(--text-muted);
    margin-bottom: 10px; line-height: 1.55;
  }
  .besonderheit strong { color: var(--amber); font-weight: 700; }

  .tipp {
    background: rgba(52,211,153,0.05);
    border-left: 3px solid var(--green);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 8px 10px; font-size: 12.5px; color: var(--text-muted);
    font-style: italic; margin-bottom: 12px; line-height: 1.55;
  }

  .links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 13px; border-radius: 20px; font-size: 11.5px; font-weight: 600;
    text-decoration: none; border: 1px solid; transition: all 0.15s;

  .link-btn:active { opacity: 0.7; }

    font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    background: rgba(52,211,153,0.12); color: var(--green);
    border: 1px solid rgba(52,211,153,0.3); border-radius: 10px;

    font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;

// Genre clusters dynamisch
const clusterColors = {};
bands.forEach(b => {
  if (!clusterColors[b.genreCluster]) clusterColors[b.genreCluster] = { bg: b.genreBg, color: b.genreColor };
});
const clusterOrder = ["Melodic Metal","Glam / Hair Metal","Psychedelic / Prog","Rock / Hard Rock","Folk / Celtic","Power / Viking","Metalcore","Death / Thrash","Black / Doom","Electronic / Pop"];
const presentClusters = [...new Set(bands.map(b => b.genreCluster))].sort((a,b) => {
  const ia = clusterOrder.indexOf(a), ib = clusterOrder.indexOf(b);
  if (ia===-1 && ib===-1) return a.localeCompare(b);
  if (ia===-1) return 1; if (ib===-1) return -1;
  return ia - ib;
});
const genreFiltersEl = document.getElementById('genre-filters');
presentClusters.forEach(cluster => {
  const c = clusterColors[cluster];
  const btn = document.createElement('button');
  btn.className = 'genre-btn';
  btn.dataset.genre = cluster;
  btn.textContent = cluster;
  btn.dataset.color = c.color;
  btn.dataset.bg = c.bg;
  btn.style.borderColor = c.color + '66';
  btn.style.color = c.color;
  btn.style.background = c.bg;
  genreFiltersEl.appendChild(btn);
});

function initials(name) {
  return name.split(' ').filter(w => w && /[A-Za-z]/.test(w[0])).map(w => w[0].toUpperCase()).join('').slice(0,2);
}
function stars(n) { return '★'.repeat(n) + '☆'.repeat(5-n); }

function openSpotify(webUrl, event) {
  event.preventDefault(); event.stopPropagation();
  const m = webUrl.match(/open\.spotify\.com\/artist\/([A-Za-z0-9]+)/);
  if (!m) { window.open(webUrl, '_blank'); return; }
  const fb = setTimeout(() => window.open(webUrl, '_blank'), 800);
  window.addEventListener('blur', () => clearTimeout(fb), { once: true });
  window.location.href = 'spotify:artist:' + m[1];
}

const cardsEl = document.getElementById('cards');
bands.forEach(band => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.role = band.role.toLowerCase();
  card.dataset.tag = band.tag;
  card.dataset.cluster = band.genreCluster;

  const zeitStr = band.zeit ? `⏱ ${band.zeit}` : '⏱ Zeit noch offen';
  let badgeHtml = '';
  if (band.role === 'Topact') badgeHtml = '<span class="topact-badge">Topact</span>';
  if (band.tag === 'tba') badgeHtml += '<span class="tba-badge">TBA</span>';
  const sparkHtml = band.besonderheit ? '<span class="dot-spark">⚡</span>' : '';

  const beshHtml = band.besonderheit
    ? `<div class="besonderheit">${band.besonderheit.icon} <strong>Besonderheit:</strong> ${band.besonderheit.text}</div>`
    : '';

  let linksHtml = '<div class="links">';
  if (band.spotify) linksHtml += `<a class="link-btn link-spotify" href="${band.spotify}" onclick="openSpotify('${band.spotify}', event)">🎵 Spotify</a>`;
  if (band.website) linksHtml += `<a class="link-btn link-web" href="${band.website}" target="_blank" rel="noopener">🌐 Website</a>`;
  linksHtml += '</div>';

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(this)">
      <div class="dot" style="background:${band.dotBg};color:${band.dotColor}">
        ${initials(band.name)}${sparkHtml}
      </div>
      <div class="card-info">
        <div class="card-name">${band.name}${badgeHtml}</div>
        <div class="card-meta">${zeitStr} · <span class="genre-tag" style="background:${band.genreBg};color:${band.genreColor}">${band.genre}</span></div>
        <div class="card-stars"><span class="stars">${stars(band.bekanntheit)}</span> &nbsp;${band.herkunft}</div>
      </div>
      <div class="chevron">▾</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <p>${band.geschichte}</p>
        ${beshHtml}
        <div class="section-label">Bekannte Songs</div>
        <div class="hits">${band.hits.map(h=>`<span class="hit">${h}</span>`).join('')}</div>
        <div class="tipp">💡 ${band.tipp}</div>
        ${linksHtml}
      </div>
    </div>
  `;
  cardsEl.appendChild(card);
});

function toggleCard(header) { header.parentElement.classList.toggle('open'); }

let activeMain = 'all', activeGenre = null;

function applyFilters() {
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const role = card.dataset.role, tag = card.dataset.tag, cluster = card.dataset.cluster;
    let mainOk = activeMain === 'all' || (activeMain === 'headliner' && role === 'topact') || tag === activeMain;
    let genreOk = !activeGenre || cluster === activeGenre;
    if (mainOk && genreOk) { card.classList.remove('hidden'); visible++; }
    else { card.classList.add('hidden'); card.classList.remove('open'); }
  });
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

document.getElementById('main-filters').querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#main-filters .filter-btn').forEach(b => b.classList.remove('active-main'));
    btn.classList.add('active-main');
    activeMain = btn.dataset.main;
    applyFilters();
  });
});
document.getElementById('genre-filters').querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => {
      b.classList.remove('active-genre');
      b.style.background = b.dataset.bg;
      b.style.borderColor = b.dataset.color + '66';
      b.style.color = b.dataset.color;
    });
    if (activeGenre === btn.dataset.genre) {
      activeGenre = null;
    } else {
      btn.classList.add('active-genre');
      btn.style.background = btn.dataset.color;
      btn.style.borderColor = btn.dataset.color;
      btn.style.color = '#0d1117';
      activeGenre = btn.dataset.genre;
    }
    applyFilters();
  });
});

applyFilters();
</script>
