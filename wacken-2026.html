:root{--bg:#0d1117;--bg-card:#161b27;--bg-card2:#1c2333;--bg-input:#0a0e17;--border:#2d333b;--border-dim:#21262d;--text:#e6edf3;--text-muted:#8b949e;--text-dim:#484f58;--green:#34d399;--green-glow:rgba(52,211,153,0.12);--blue:#60a5fa;--blue-glow:rgba(96,165,250,0.12);--red:#f87171;--amber:#fbbf24;--radius:8px;--shadow:0 1px 8px rgba(0,0,0,0.4);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;font-size:14px;line-height:1.5;}

.header{background:linear-gradient(135deg,#0a0e17 0%,#111827 60%,#0f1e33 100%);padding:22px 24px 18px;border-bottom:1px solid var(--border-dim);text-align:center;position:sticky;top:0;z-index:100;overflow:hidden;}

.back-btn{position:relative;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-muted);background:var(--bg-input);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 10px;text-decoration:none;margin-bottom:10px;transition:all .15s;}

.header-logo{font-size:11px;color:var(--green);letter-spacing:2px;text-transform:uppercase;font-weight:700;position:relative;}
.header-title{font-size:22px;font-weight:700;color:var(--green);margin:4px 0 3px;letter-spacing:-0.3px;position:relative;}
.header-planer{font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;position:relative;}
.header-sub{font-size:11px;color:var(--text-muted);line-height:1.5;position:relative;}
.filter-wrap{background:var(--bg-card);border-bottom:1px solid var(--border-dim);padding:10px 12px 8px;position:sticky;top:96px;z-index:90;}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.filter-sep{display:flex;align-items:center;gap:8px;margin:3px 0 5px;}
.filter-sep-line{flex:1;height:1px;background:var(--border-dim);}
.filter-sep-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;font-weight:700;}

.expand-btn{color:var(--text-dim);font-size:16px;flex-shrink:0;transition:transform .2s;padding:4px;}
.band-card.open .expand-btn{transform:rotate(180deg);}
.band-body{display:none;border-top:1px solid var(--border-dim);padding:12px 14px 14px;}
.band-card.open .band-body{display:block;}
.band-section{margin-bottom:10px;}
.band-section:last-child{margin-bottom:0;}
.section-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:700;}
.band-body p{font-size:13px;line-height:1.6;color:var(--text-muted);}
.hits-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.hit-pill{background:var(--bg-card2);border:1px solid var(--border-dim);border-radius:14px;padding:3px 10px;font-size:11px;color:var(--text-muted);}
.besonderheit-box{background:rgba(251,191,36,0.06);border-left:3px solid var(--amber);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}

.tipp-box{background:rgba(52,211,153,0.05);border-left:3px solid var(--green);border-radius:0 var(--radius) var(--radius) 0;padding:8px 10px;font-size:12.5px;color:var(--text-muted);font-style:italic;line-height:1.55;}

// ─── CONFIG ──────────────────────────────────────────────────────────────────
let activeTab = "alle";
let activeGenre = null;
const priorityClusters = ["Melodic Metal","Glam / Hair Metal","Psychedelic / Prog","Rock / Hard Rock"];
const clusterColors = {
  "Melodic Metal":     {bg:"rgba(216,90,48,0.18)",  color:"#e87a50"},
  "Glam / Hair Metal": {bg:"rgba(212,83,126,0.18)", color:"#e07090"},
  "Psychedelic / Prog":{bg:"rgba(55,138,221,0.18)", color:"#5090dd"},
  "Rock / Hard Rock":  {bg:"rgba(99,153,34,0.18)",  color:"#7bbf30"},
  "Folk / Celtic":     {bg:"rgba(29,158,117,0.18)", color:"#20b080"},
  "Power / Viking":    {bg:"rgba(186,117,23,0.18)", color:"#c89030"},
  "Metalcore":         {bg:"rgba(127,119,221,0.18)",color:"#9990e8"},
  "Death / Thrash":    {bg:"rgba(180,40,40,0.18)",  color:"#cc4040"},
  "Black / Doom":      {bg:"rgba(55,138,221,0.18)", color:"#5090dd"},
  "Electronic / Pop":  {bg:"rgba(20,160,180,0.18)", color:"#20a0c0"},
};
const tagConfig = {
  "alle":       {label:"Alle",                     cls:""},
  "Headliner":  {label:"Headliner",                cls:""},
  "mittwoch":   {label:"Mi · Wasted Wednesday",    cls:"pill-mi"},
  "donnerstag": {label:"Do · 30. Juli",            cls:"pill-do"},
  "freitag":    {label:"Fr · 31. Juli",            cls:"pill-fr"},
  "samstag":    {label:"Sa · 01. Aug",             cls:"pill-sa"},
};
const tagBgColors  = {mittwoch:"rgba(251,191,36,0.15)",donnerstag:"rgba(96,165,250,0.15)",freitag:"rgba(248,113,113,0.15)",samstag:"rgba(52,211,153,0.15)"};
const tagTxtColors = {mittwoch:"#fbbf24",donnerstag:"#60a5fa",freitag:"#f87171",samstag:"#34d399"};
const tagLabels    = {mittwoch:"MI",donnerstag:"DO",freitag:"FR",samstag:"SA"};

function getClusters(){
  const set=new Set(bands.map(b=>b.genreCluster));
  const res=[];
  for(const c of priorityClusters) if(set.has(c)) res.push(c);
  [...set].filter(c=>!priorityClusters.includes(c)).sort().forEach(c=>res.push(c));
  return res;
}
function renderFilters(){
  document.getElementById("row1").innerHTML=Object.entries(tagConfig).map(([id,cfg])=>{
    const a=activeTab===id;
    return `<div class="pill ${cfg.cls}${a?' active':''}" onclick="setTab('${id}')">${cfg.label}</div>`;
  }).join("");
  document.getElementById("genreRow").innerHTML=getClusters().map(c=>{
    const col=clusterColors[c]||{bg:"rgba(150,150,150,0.2)",color:"#888"};
    const a=activeGenre===c;
    const style=a?`background:${col.color};border-color:${col.color};color:#0d1117`:`background:${col.bg};border-color:${col.color}66;color:${col.color}`;
    return `<div class="pill-genre${a?' active':''}" style="${style}" onclick="setGenre('${c}')">${c}</div>`;
  }).join("");
}
function setTab(t){activeTab=t;render();}
function setGenre(g){activeGenre=(activeGenre===g?null:g);render();}
function filterBands(){
  return bands.filter(b=>{
    const tabOk=activeTab==="alle"||(activeTab==="Headliner"&&b.role==="Headliner")||
                (["mittwoch","donnerstag","freitag","samstag"].includes(activeTab)&&b.tag===activeTab);
    const genreOk=!activeGenre||b.genreCluster===activeGenre;
    return tabOk&&genreOk;
  });
}
function sortBands(arr){
  return arr.slice().sort((a,b)=>{
    if(a.role!==b.role)return a.role==="Headliner"?-1:1;
    return b.bekanntheit-a.bekanntheit;
  });
}
function initials(name){
  const w=name.trim().split(/\s+/).filter(x=>/[a-zA-ZäöüÄÖÜß]/i.test(x));
  return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():name.slice(0,2).toUpperCase();
}
function stars(n){return"★".repeat(n)+"☆".repeat(5-n);}
function openSpotify(webUrl,event){
  event.preventDefault();event.stopPropagation();
  const m=webUrl.match(/open\.spotify\.com\/artist\/([A-Za-z0-9]+)/);
  if(!m){window.open(webUrl,'_blank');return;}
  const fb=setTimeout(()=>window.open(webUrl,'_blank'),800);
  window.addEventListener('blur',()=>clearTimeout(fb),{once:true});
  window.location.href='spotify:artist:'+m[1];
}
function toggleCard(id){document.getElementById('card-'+id).classList.toggle('open');}
function renderCard(b,i){
  const ini=initials(b.name);
  const lightning=b.besonderheit?'<span class="dot-lightning">⚡</span>':'';
  const tagBadge=tagLabels[b.tag]?`<span style="background:${tagBgColors[b.tag]};color:${tagTxtColors[b.tag]};border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;letter-spacing:1px">${tagLabels[b.tag]}</span>`:'';
  const hBadge=b.role==="Headliner"?'<span class="badge-headliner">Headliner</span>':'';
  const aBadge=b.abschied?'<span class="badge-abschied">⚠ Abschied</span>':'';
  const links=[
    b.spotify?`<a class="link-btn link-spotify" href="${b.spotify}" onclick="openSpotify('${b.spotify}',event)">🎵 Spotify</a>`:'',
    b.website?`<a class="link-btn link-web" href="${b.website}" target="_blank">🌐 Website</a>`:'',
  ].filter(Boolean).join('');
  const besBox=b.besonderheit?`<div class="band-section"><div class="section-label">Besonderheit</div><div class="besonderheit-box"><span class="besonderheit-icon">${b.besonderheit.icon}</span><span class="besonderheit-text">${b.besonderheit.text}</span></div></div>`:'';
  return `<div class="band-card tag-${b.tag}" id="card-${i}">
<div class="band-header" onclick="toggleCard(${i})">
  <div class="dot" style="background:${b.dotBg};color:${b.dotColor}">${ini}${lightning}</div>
  <div class="band-header-info">
    <div class="band-name">${b.name}</div>
    <div class="band-meta">⏱ ${b.zeit||'Zeit n.n.'} · <span style="color:${b.genreColor}">${b.genre}</span></div>
    <div class="band-header-stars"><span class="stars">${stars(b.bekanntheit)}</span> <span>${b.herkunft}</span> ${tagBadge} ${hBadge} ${aBadge}</div>
  </div>
  <div class="expand-btn">⌄</div>
</div>
<div class="band-body">
  <div class="band-section"><div class="section-label">Geschichte</div><p>${b.geschichte}</p></div>
  <div class="band-section"><div class="section-label">Bekannte Songs</div><div class="hits-list">${b.hits.map(h=>`<span class="hit-pill">${h}</span>`).join('')}</div></div>
  ${besBox}
  <div class="band-section"><div class="section-label">Empfehlung</div><div class="tipp-box">${b.tipp}</div></div>
  ${links?`<div class="link-row">${links}</div>`:''}
</div>
</div>`;
}
function render(){
  renderFilters();
  const sorted=sortBands(filterBands());
  const list=document.getElementById('bandList');
  list.innerHTML=sorted.length===0?`<div class="no-results">Keine Bands für diese Filterauswahl.</div>`:sorted.map((b,i)=>renderCard(b,i)).join('');
  document.getElementById('bandCount').textContent=`${sorted.length} Band${sorted.length!==1?'s':''} angezeigt`;
  document.getElementById('filterWrap').style.top=document.querySelector('.header').offsetHeight+'px';
}
render();

</script>
